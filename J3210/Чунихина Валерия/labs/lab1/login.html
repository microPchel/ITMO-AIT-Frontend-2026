<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — AIBloom</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<!-- Навигация -->
<nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <span class="brand-flower">🏵️</span> AIBloom
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Поиск</a>
            <a class="nav-link active" href="login.html">Вход</a>
        </div>
    </div>
</nav>

<!-- Форма входа -->
<div class="container mt-5">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-5 col-lg-4">
            <!-- Карточка формы -->
            <div class="card border-0 shadow-sm p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold" style="color: var(--bloom-green);">С возвращением!</h3>
                        <p class="text-muted small">Войдите, чтобы ухаживать за своим садом моделей</p>
                    </div>

                    <form id="loginForm">
                        <!-- Поле Email -->
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Ваш Email</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                        </div>

                        <!-- Поле Пароль -->
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase">Пароль</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                        </div>

                        <!-- Кнопка входа -->
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Войти в оранжерею</button>

                        <div class="text-center">
                            <span class="small text-muted">Еще не с нами? </span>
                            <!-- Ссылка на регистрацию -->
                            <a href="register.html" class="small fw-bold text-decoration-none" style="color: var(--bloom-orange);">Создать аккаунт</a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Дополнительная ссылка внизу -->
            <div class="text-center mt-4">
                <a href="index.html" class="text-muted small text-decoration-none">← Вернуться к поиску моделей</a>
            </div>
        </div>
    </div>
</div>
