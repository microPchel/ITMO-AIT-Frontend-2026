<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — AIBloom</title>
  <!-- Подключаем Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<!-- Навигация -->
<nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">
      <span class="brand-flower">🏵️</span> AIBloom
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="index.html">Поиск</a>
      <a class="nav-link" href="login.html">Вход</a>
    </div>
  </div>
</nav>

<!-- Форма регистрации -->
<div class="container mt-5">
  <div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-6 col-lg-5">
      <div class="card border-0 shadow-sm p-4">
        <div class="card-body">
          <div class="text-center mb-4">
            <h3 class="fw-bold" style="color: var(--bloom-green);">Создать аккаунт</h3>
            <p class="text-muted small">Начните выращивать свои идеи вместе с AIBloom</p>
          </div>

          <form id="registerForm">
            <!-- Поле Имя -->
            <div class="mb-3">
              <label class="form-label small fw-bold text-uppercase">Полное имя</label>
              <input type="text" class="form-control px-3 py-2" placeholder="Петя Иванов" required>
            </div>

            <!-- Поле Email -->
            <div class="mb-3">
              <label class="form-label small fw-bold text-uppercase">Email</label>
              <input type="email" class="form-control px-3 py-2" placeholder="name@example.com" required>
            </div>

            <!-- Поле Пароль -->
            <div class="mb-3">
              <label class="form-label small fw-bold text-uppercase">Пароль</label>
              <input type="password" class="form-control px-3 py-2" placeholder="Придумайте надежный пароль" required>
            </div>

            <!-- Чекбокс согласия -->
            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="terms" required>
              <label class="form-check-label small text-muted" for="terms">
                Я согласен с условиями использования и политикой посева данных
              </label>
            </div>

            <!-- Кнопка регистрации -->
            <button type="submit" class="btn btn-accent w-100 py-2 mb-3 shadow-sm">Зарегистрироваться</button>

            <div class="text-center">
              <span class="small text-muted">Уже в саду? </span>
              <a href="login.html" class="small fw-bold text-decoration-none" style="color: var(--bloom-green);">Войти в аккаунт</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Скрипты -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
