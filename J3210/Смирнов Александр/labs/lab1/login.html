<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Models & Datasets</title>
    <!-- Basic Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">AI Hub</a>
            
            <div class="ms-auto" id="auth-nav">
                <a href="login.html" class="btn btn-outline-light me-2">Log in</a>
                <a href="register.html" class="btn btn-primary">Sign up</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">Log in</h2>
            <form id="login-form" action="profile.html">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Log in</button>
            </form>
            <p class="text-center mt-3">
                Don't have an account? <a href="register.html">Sign up</a>
            </p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-3">
        <div class="container">
            <small>Frontend Lab 1 - AI Platform</small>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
