<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Models & Datasets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">AI Hub</a>
            
            <div class="ms-auto" id="auth-nav">
                <a href="login.html" class="btn btn-outline-light me-2">Log in</a>
                <a href="register.html" class="btn btn-primary">Sign up</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container">
        <div class="row">
            <!-- Sidebar filters -->
            <aside class="col-md-3">
                <div class="sidebar-filters">
                    <h4>Filters</h4>
                    <hr>
                    
                    <label class="form-label fw-bold small">Type</label>
                    <select id="filter-type" class="form-select form-select-sm mb-3">
                        <option value="all">All</option>
                        <option value="model">Models</option>
                        <option value="dataset">Datasets</option>
                    </select>

                    <label class="form-label fw-bold small">Task</label>
                    <select id="filter-task" class="form-select form-select-sm mb-3">
                        <option value="all">All</option>
                        <option value="cv">Computer Vision</option>
                        <option value="nlp">NLP</option>
                    </select>

                    <label class="form-label fw-bold small">License</label>
                    <select id="filter-license" class="form-select form-select-sm mb-3">
                        <option value="all">All</option>
                        <option value="mit">MIT</option>
                        <option value="apache">Apache 2.0</option>
                        <option value="cc">Creative Commons</option>
                    </select>

                    <button id="apply-filters" class="btn btn-outline-primary w-100 mt-2">Apply Filters</button>
                </div>
            </aside>

            <!-- Catalog -->
            <section class="col-md-9">
                <div class="mb-4">
                    <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search by name...">
                </div>
                <div id="catalog-container"></div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-3">
        <div class="container">
            <small>Frontend Lab 1 - AI Platform</small>
        </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
