<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>n3n – Личный кабинет</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
<!-- # Верхнее меню (header) с логотипом и навигацией # -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
      <span class="logo-n3n">
        <span class="logo-n3n-black">n</span>
        <span class="logo-n3n-red">3</span>
        <span class="logo-n3n-black">n</span>
      </span>
    </a>
    <div class="collapse navbar-collapse show">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="workspaces.html">Рабочие пространства</a></li>
        <li class="nav-item"><a class="nav-link" href="community.html">Сообщество</a></li>
        <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- # Основное содержимое: обзор активных workflows # -->
<main class="container my-4">
  <div class="page-title">
    <div>
      <div class="page-title-badge">Обзор</div>
      <h1 class="h4 mb-0">Активные workflows (Рабочие пространства)</h1>
    </div>
  </div>

  <!-- # Карточки-статистики по рабочим пространствам # -->
  <div class="row justify-content-start">
    <div class="col-lg-8">
      <div class="row g-3 mb-3 mt-1">
        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-body d-flex flex-column justify-content-between">
              <p class="text-muted small mb-1">Активных пространств</p>
              <div class="d-flex align-items-end justify-content-between">
                <span class="fs-4 fw-semibold">1</span>
                <span class="badge bg-success-subtle text-success border">OK</span>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-body d-flex flex-column justify-content-between">
              <p class="text-muted small mb-1">Черновики</p>
              <div class="d-flex align-items-end justify-content-between">
                <span class="fs-4 fw-semibold">3</span>
                <span class="badge bg-light border text-muted">Drafts</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Подключение Bootstrap JS (для модалок и др. компонентов) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
