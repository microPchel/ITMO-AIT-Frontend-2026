<!-- html/workspaces.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>n3n – Рабочие пространства</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
<!-- # Верхнее меню (header) с логотипом и навигацией # -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
      <span class="logo-n3n">
        <span class="logo-n3n-black">n</span>
        <span class="logo-n3n-red">3</span>
        <span class="logo-n3n-black">n</span>
      </span>
    </a>
    <div class="collapse navbar-collapse show">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="workspaces.html">Рабочие пространства</a></li>
        <li class="nav-item"><a class="nav-link" href="community.html">Сообщество</a></li>
        <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- # Основное содержимое: создание и список рабочих пространств # -->
<main class="container my-4">
  <h1 class="h4 mb-3">Рабочие пространства</h1>
  <div class="row">
    <!-- Левая колонка: форма создания нового пространства -->
    <div class="col-md-5">
      <h2 class="h6 mb-3">Создать новое</h2>
      <form id="workspace-form">
        <div class="mb-3">
          <label class="form-label">Название пространства</label>
          <input type="text" class="form-control" id="workspace-name" placeholder="Например, Marketing automations">
        </div>
        <div class="mb-3">
          <label class="form-label">Описание</label>
          <textarea class="form-control" id="workspace-description" rows="3" placeholder="Краткое описание"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Создать (демо)</button>
      </form>
    </div>
    
    <!-- Правая колонка: список уже существующих пространств -->
    <div class="col-md-7">
      <h2 class="h6 mb-3">Список ваших пространств</h2>
      <ul class="list-group" id="workspace-list">
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <span>Demo workspace</span>
          <a href="workspace-page.html" class="btn btn-sm btn-outline-primary">Открыть</a>
        </li>
      </ul>
    </div>
  </div>
</main>

<!-- Подключение Bootstrap JS (для модалок и др. компонентов) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
