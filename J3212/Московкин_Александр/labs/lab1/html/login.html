<!-- html/login.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>n3n – Вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
<!-- # Верхнее меню (header) с логотипом и навигацией # -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
      <span class="logo-n3n">
        <span class="logo-n3n-black">n</span>
        <span class="logo-n3n-red">3</span>
        <span class="logo-n3n-black">n</span>
      </span>
    </a>
  </div>
</nav>

<!-- # Основной блок с формой входа # -->
<main class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <h1 class="h4 mb-3 text-center">
      Вход в
      <span class="logo-n3n mb-3">
        <span class="logo-n3n-black">n</span><span class="logo-n3n-red">3</span><span class="logo-n3n-black">n</span>
      </span>
    </h1>
      <!-- Форма авторизации (без реальной отправки) -->
      <form>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Пароль</label>
          <input type="password" class="form-control" placeholder="Пароль">
        </div>
        <button type="button" class="btn btn-primary w-100 mb-2"
                data-bs-toggle="modal" data-bs-target="#loginModal">
          Войти
        </button>
        <div class="text-center">
          <a href="register.html" class="small">Создать аккаунт</a>
        </div>
      </form>
    </div>
  </div>
</main>

<!-- Простое модальное окно для демонстрации -->
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Демо входа</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Здесь мог бы быть реальный процесс авторизации.
      </div>
      <div class="modal-footer">
        <a href="dashboard.html" class="btn btn-primary">Перейти в кабинет</a>
      </div>
    </div>
  </div>
</div>

<!-- Подключение Bootstrap JS (для модалок и др. компонентов) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
