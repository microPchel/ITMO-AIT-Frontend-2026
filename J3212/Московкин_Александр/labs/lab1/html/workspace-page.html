<!-- html/workspace-page.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>n3n – Рабочее пространство</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
<!-- # Верхнее меню (header) с логотипом и навигацией # -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
      <span class="logo-n3n">
        <span class="logo-n3n-black">n</span>
        <span class="logo-n3n-red">3</span>
        <span class="logo-n3n-black">n</span>
      </span>
    </a>
    <span class="ms-3 small text-muted">Demo workspace</span>
    <div class="collapse navbar-collapse show">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="workspaces.html">Рабочие пространства</a></li>
        <li class="nav-item"><a class="nav-link" href="community.html">Сообщество</a></li>
        <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- # Основное содержимое страницы рабочего пространства # -->
<main class="container-fluid">
  <div class="row">
    <div class="col-md-2 border-end bg-white">
      <div class="p-3">
        <div class="page-title mb-3">
          <div>
            <div class="page-title-badge">Workspace</div>
            <h1 class="h6 mb-0">Demo workspace</h1>
          </div>
        </div>
        <ul class="list-unstyled small">
          <li class="mb-2"><a href="#" class="link-secondary text-decoration-none">Все потоки</a></li>
          <li class="mb-2"><a href="#" class="link-secondary text-decoration-none">Черновики</a></li>
          <li class="mb-2"><a href="#" class="link-secondary text-decoration-none">Настройки</a></li>
        </ul>
      </div>
    </div>
    
    <!-- Правая колонка: зона будущего визуального редактора графа -->
    <div class="col-md-10">
      <div class="p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="page-title mb-0">
            <div>
              <div class="page-title-badge">Редактор</div>
              <h2 class="h5 mb-0">Поле для графа</h2>
            </div>
          </div>
          <div>
            <button class="btn btn-sm btn-outline-secondary me-2">Сохранить (демо)</button>
            <button class="btn btn-sm btn-primary">Запустить (демо)</button>
          </div>
        </div>

        <p class="small text-muted mb-2">
          Ниже — пустое поле для будущего визуального редактора графов.
        </p>
        <div id="graph-area" class="border rounded bg-white" style="height: 500px;">
          <!-- Здесь в будущем будет редактор графа -->
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Подключение Bootstrap JS (для модалок и др. компонентов) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
