<!-- html/search.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>n3n – Поиск</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
<!-- # Верхнее меню (header) с логотипом и навигацией # -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
      <span class="logo-n3n">
        <span class="logo-n3n-black">n</span>
        <span class="logo-n3n-red">3</span>
        <span class="logo-n3n-black">n</span>
      </span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="workspaces.html">Рабочие пространства</a></li>
        <li class="nav-item"><a class="nav-link" href="community.html">Сообщество</a></li>
        <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- # Основное содержимое: поиск по рабочим пространствам # -->
<main class="container my-4">
  <h1 class="h4 mb-3">Поиск рабочих пространств</h1>

  <!-- Форма поиска и фильтров -->
  <form class="row g-3 mb-4" id="search-form">
    <div class="col-md-4">
      <label class="form-label">Поиск по названию</label>
      <input type="text" class="form-control" id="search-query" placeholder="Введите название">
    </div>
    <div class="col-md-4">
      <label class="form-label">Тип</label>
      <select class="form-select" id="filter-type">
        <option value="">Любой</option>
        <option value="marketing">Маркетинг</option>
        <option value="dev">Разработка</option>
        <option value="other">Другое</option>
      </select>
    </div>
    <div class="col-md-4 d-flex align-items-end">
      <button type="submit" class="btn btn-primary me-2">Найти</button>
      <button type="button" class="btn btn-outline-secondary" id="reset-filters">Сбросить</button>
    </div>
  </form>

  <!-- Результаты поиска -->
  <div id="search-results">
    <p class="small text-muted">Пока что показаны демонстрационные результаты.</p>
    <ul class="list-group" id="results-list">
    </ul>
  </div>
</main>

<!-- Подключение Bootstrap JS (для модалок и др. компонентов) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
