<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tripatropa — Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="auth-page bg-light">
  <div class="container d-flex align-items-center justify-content-center py-5">
    <div class="auth-card card tripatropa-card p-4 p-md-5 bg-white">
      <div class="text-center mb-4">
        <div
          class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary-subtle text-primary mb-3"
          style="width: 52px; height: 52px">
          <i class="bi bi-compass"></i>
        </div>
        <h1 class="h4 mb-1">Создайте аккаунт Tripatropa</h1>
        <p class="text-muted mb-0">
          Сохраняйте маршруты и путешествуйте осознанно
        </p>
      </div>

      <form>
        <div class="mb-3">
          <label for="registerName" class="form-label">Имя</label>
          <input type="text" class="form-control" id="registerName" placeholder="Иван Иванов" />
        </div>
        <div class="mb-3">
          <label for="registerEmail" class="form-label">Email</label>
          <input type="email" class="form-control" id="registerEmail" placeholder="you@example.com" />
        </div>
        <div class="mb-3">
          <label for="registerPassword" class="form-label">Пароль</label>
          <input type="password" class="form-control" id="registerPassword" placeholder="••••••••" />
        </div>
        <div class="mb-3">
          <label for="registerPasswordConfirm" class="form-label">
            Подтверждение пароля
          </label>
          <input type="password" class="form-control" id="registerPasswordConfirm" placeholder="••••••••" />
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" value="" id="agreeTerms" />
          <label class="form-check-label" for="agreeTerms">
            Я принимаю условия использования сервиса
          </label>
        </div>
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary">
            Создать аккаунт
          </button>
        </div>
        <p class="mb-0 text-center text-muted-sm">
          Уже есть аккаунт?
          <a href="login.html" class="text-decoration-none">Войти</a>
        </p>
      </form>

      <div class="mt-4 text-center">
        <a href="search.html" class="small text-decoration-none">
          ← Вернуться к поиску направлений </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="js/app.js"></script>
</body>

</html>
