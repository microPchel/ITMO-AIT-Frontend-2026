<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финанас - Поиск транзакций</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
            <img src="img/logo.png" alt="Логотип Финанас" width="45" class="me-2">
            Финанас
        </a>
        <div class="d-flex align-items-center">
            <a href="dashboard.html" class="btn btn-outline-light btn-sm me-3">
                <i class="bi bi-house-door me-1"></i> На главную
            </a>
            <span class="navbar-text text-white me-3">Привет, Иван Иванов!</span>
            <a href="login.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i> Выйти
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4 text-success fw-bold"><i class="bi bi-search me-2"></i> Поиск и фильтрация</h2>

    <div class="card shadow-sm mb-4 border-success" style="border-radius: 15px;">
        <div class="card-body">
            <div class="card shadow-sm mb-4 border-success" style="border-radius: 15px;">
                <div class="card-body">
                    <form class="row g-3 align-items-end">

                        <div class="col-md-4">
                            <label class="form-label text-muted"><i class="bi bi-textarea-t me-1"></i> Название</label>
                            <input type="text" class="form-control" placeholder="Например: Супермаркет">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label text-muted"><i class="bi bi-arrow-left-right me-1"></i> Тип операции</label>
                            <select class="form-select">
                                <option value="all">Все типы</option>
                                <option value="expense">Только расходы</option>
                                <option value="income">Только доходы</option>
                            </select>
                        </div>

                        <div class="col-md-5">
                            <label class="form-label text-muted"><i class="bi bi-tags me-1"></i> Категория</label>
                            <select class="form-select">
                                <option value="all">Все категории</option>
                                <option value="food">Продукты</option>
                                <option value="transport">Транспорт</option>
                                <option value="salary">Зарплата</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label text-muted"><i class="bi bi-cash-coin me-1"></i> Сумма (₽)</label>
                            <div class="input-group">
                                <input type="number" class="form-control" placeholder="От">
                                <span class="input-group-text">-</span>
                                <input type="number" class="form-control" placeholder="До">
                            </div>
                        </div>

                        <div class="col-md-5">
                            <label class="form-label text-muted"><i class="bi bi-calendar3 me-1"></i> Период</label>
                            <div class="input-group">
                                <input type="date" class="form-control">
                                <span class="input-group-text">-</span>
                                <input type="date" class="form-control">
                            </div>
                        </div>

                        <div class="col-md-3">
                            <button type="submit" class="btn btn-success w-100 shadow-sm">
                                <i class="bi bi-search me-1"></i> Найти
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm" style="border-radius: 15px;">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Дата</th>
                    <th>Название</th>
                    <th>Категория</th>
                    <th class="text-end">Сумма</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td class="text-muted small">14.03.2026</td>
                    <td class="fw-bold">Супермаркет "Лента"</td>
                    <td><span class="badge bg-light text-dark border"><i class="bi bi-cart me-1"></i> Продукты</span></td>
                    <td class="text-danger text-end fw-bold">- 1 588 ₽</td>
                </tr>
                <tr>
                    <td class="text-muted small">13.03.2026</td>
                    <td class="fw-bold">Аванс</td>
                    <td><span class="badge bg-light text-dark border"><i class="bi bi-briefcase me-1"></i> Зарплата</span></td>
                    <td class="text-success text-end fw-bold">+ 52 000 ₽</td>
                </tr>
                <tr>
                    <td class="text-muted small">12.03.2026</td>
                    <td class="fw-bold">Заправка Газпром</td>
                    <td><span class="badge bg-light text-dark border"><i class="bi bi-car-front me-1"></i> Транспорт</span></td>
                    <td class="text-danger text-end fw-bold">- 2 000 ₽</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
