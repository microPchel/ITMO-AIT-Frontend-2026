<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>

    <link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>

    <style>
      body {
        background-color: #f5f5f7;
      }

      .register-wrapper {
        max-width: 420px;
        margin: 5rem auto; 
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">MLDrop</a>
      </div>
    </nav>

    <div class="register-wrapper">
      <h2 class="mb-4 text-center">Регистрация</h2>

      <form action="/register" method="post">
        <div class="mb-3">
          <label for="regName" class="form-label">Имя</label>
          <input type="text" class="form-control" id="regName" name="name" required>
        </div>

        <div class="mb-3">
          <label for="regEmail" class="form-label">Email</label>
          <input type="email" class="form-control" id="regEmail" name="email" required>
        </div>

        <div class="mb-3">
          <label for="regPassword" class="form-label">Пароль</label>
          <input type="password" class="form-control" id="regPassword" name="password" required>
        </div>

        <div class="mb-3">
          <label for="regPassword2" class="form-label">Повторите пароль</label>
          <input type="password" class="form-control" id="regPassword2" name="password2" required>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="agree" required>
          <label class="form-check-label" for="agree">
            Я принимаю условия использования
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Создать аккаунт
        </button>

        <p class="text-center text-muted mt-3 mb-0">
        После регистрации вы попадёте на
        <a href="index.html">главную страницу аккаунта</a>
        </p>

        <p class="text-center text-muted mt-3 mb-0">
          Уже есть аккаунт? <a href="login.html">Войти</a>
        </p>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
