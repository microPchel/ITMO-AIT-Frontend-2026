<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Events</a>
                    </li>
                </ul>

                <div class="d-flex" id="authButtons">
                    <a href="login.html" class="btn btn-outline-light me-3">Login</a>
                    <a href="register.html" class="btn btn-warning">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
     <div class="container my-5">
  <div class="row">
    <!-- register -->
    <div class="col-md-6">
      <h3>Register as Organizer</h3>
      <form id="orgRegisterForm">
        <input type="text" id="orgRegName" placeholder="Full Name" class="form-control mb-2" required>
        <input type="email" id="orgRegEmail" placeholder="Email" class="form-control mb-2" required>
        <input type="password" id="orgRegPassword" placeholder="Password" class="form-control mb-2" required>
        <button type="submit" class="btn btn-success">Register</button>
      </form>
    </div>

    <!-- login -->
    <div class="col-md-6">
      <h3>Login as Organizer</h3>
      <form id="orgLoginForm">
        <input type="email" id="orgLoginEmail" placeholder="Email" class="form-control mb-2" required>
        <input type="password" id="orgLoginPassword" placeholder="Password" class="form-control mb-2" required>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </div>
  </div>
</div>
    <!-- Footer -->
     <footer class="site-footer mt-auto">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/organizer-login.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
