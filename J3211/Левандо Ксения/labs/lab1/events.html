<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Events</a>
                    </li>
                </ul>

                <div class="d-flex" id="authButtons">
                    <a href="login.html" class="btn btn-outline-light me-3">Login</a>
                    <a href="register.html" class="btn btn-warning">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container my-5">
        <!-- Header -->
        <h1 class="mb-4">Events</h1>

        <!-- Filters -->
        <div class="row mb-4">
            <!-- 1. Type -->
            <div class="col-md-4">
            <select id="typeFilter" class="form-select">
            <option value="All">All types</option>
            <option value="Concert">Concert</option>
            <option value="Festival">Festival</option>
            <option value="Theatre">Theatre</option>
            <option value="Sport">Sport</option>
            <option value="Exhibition">Exhibition</option>
            <option value="Other">Other</option>
            </select>
            </div>
            <!-- 2. Date -->
            <div class="col-md-4">
                <input id="dateFilter" type="date" class="form-control">
            </div>
            <!-- 3. City -->
            <div class="col-md-4">
                <input id="cityFilter" type="text" class="form-control" placeholder="City">
            </div>

        </div>


    <!-- Events grid -->
    <div class="row g-4" id="eventsContainer"></div>
    </div>
    <!-- Footer -->
     <footer class="site-footer mt-auto">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
