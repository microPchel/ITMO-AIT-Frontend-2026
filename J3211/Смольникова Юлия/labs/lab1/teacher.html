<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кабинет преподавателя</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body class="teacher-page">
    <div id="navbar-container"></div>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
            <div>
                <h1 class="h2 mb-1">Личный кабинет преподавателя</h1>
                <p class="text-muted mb-0">Управление курсами, материалами и уроками</p>
            </div>

            <button class="btn btn-primary-custom" type="button" data-bs-toggle="modal"
                data-bs-target="#addCourseModal">
                Добавить курс
            </button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <h6 class="text-muted">Всего курсов</h6>
                        <div class="fs-3 fw-bold" id="teacherCoursesCount">0</div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <h6 class="text-muted">Студентов</h6>
                        <div class="fs-3 fw-bold text-primary" id="teacherStudentsCount">0</div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <h6 class="text-muted">Активных курсов</h6>
                        <div class="fs-3 fw-bold text-success" id="teacherActiveCoursesCount">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <h5 class="fw-bold mb-0">Мои курсы</h5>
                    <small class="text-muted">Список доступных курсов</small>
                </div>

                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Курс</th>
                                <th>Студенты</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="teacherCoursesList">
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Добавить материал</h5>

                        <form id="uploadMaterialForm">
                            <div class="mb-3">
                                <label for="materialCourseSelect" class="form-label">Выберите курс</label>
                                <select class="form-select" id="materialCourseSelect">
                                    <option value="">Выберите курс</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="materialTitle" class="form-label">Название материала</label>
                                <input type="text" class="form-control" id="materialTitle"
                                    placeholder="Например, Конспект лекции 1">
                            </div>

                            <div class="mb-3">
                                <label for="materialLink" class="form-label">Ссылка на ресурс</label>
                                <input type="text" class="form-control" id="materialLink"
                                    placeholder="https://example.com/file.pdf">
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100">
                                Добавить материал
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Добавить урок</h5>

                        <form id="addLessonForm">
                            <div class="mb-3">
                                <label for="lessonCourseSelect" class="form-label">Курс</label>
                                <select class="form-select" id="lessonCourseSelect">
                                    <option value="">Выберите курс</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="lessonTitle" class="form-label">Название урока</label>
                                <input type="text" class="form-control" id="lessonTitle"
                                    placeholder="Например, Введение в Bootstrap">
                            </div>

                            <div class="mb-3">
                                <label for="lessonDuration" class="form-label">Длительность</label>
                                <input type="text" class="form-control" id="lessonDuration"
                                    placeholder="Например, 08:30">
                            </div>

                            <div class="mb-3">
                                <label for="lessonVideoId" class="form-label">YouTube videoId</label>
                                <input type="text" class="form-control" id="lessonVideoId"
                                    placeholder="Например, dQw4w9WgXcQ">
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100">
                                Добавить урок
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1 fw-semibold">Learnify</p>
            <p class="mb-0 small text-light">Платформа для онлайн-курсов и обучения</p>
        </div>
    </footer>

    <div class="modal fade" id="addCourseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Новый курс</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>

                <div class="modal-body">
                    <form id="createCourseForm">
                        <div class="mb-3">
                            <label for="newCourseTitle" class="form-label">Название</label>
                            <input type="text" id="newCourseTitle" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="newCourseSubject" class="form-label">Предмет</label>
                            <input type="text" id="newCourseSubject" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="newCourseLevel" class="form-label">Уровень</label>
                            <select id="newCourseLevel" class="form-select" required>
                                <option value="">Выберите уровень</option>
                                <option value="Новичок">Новичок</option>
                                <option value="Средний">Средний</option>
                                <option value="Продвинутый">Продвинутый</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="newCoursePrice" class="form-label">Цена</label>
                            <input type="number" id="newCoursePrice" class="form-control" min="0" value="0">
                        </div>

                        <div class="mb-3">
                            <label for="newCourseDesc" class="form-label">Описание</label>
                            <textarea id="newCourseDesc" class="form-control" rows="4" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100">Создать курс</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/teacher-page.js"></script>
</body>

</html>
