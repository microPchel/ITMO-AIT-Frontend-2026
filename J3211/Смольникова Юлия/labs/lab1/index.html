<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnify — Каталог курсов</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <div id="navbar-container"></div>

    <section class="hero">
        <div class="container text-center">
            <h1 class="display-5 fw-bold mb-3">
                Каталог онлайн-курсов
            </h1>
            <p class="lead mb-0">
                Учитесь программированию, дизайну и веб-разработке в удобном формате.
            </p>
        </div>
    </section>

    <main class="container my-5">
        <section class="catalog-section">
            <div class="section-header mb-3">
                <div>
                    <h2 class="section-title mb-1">Найти курс</h2>
                </div>
            </div>

            <form id="filterForm" class="filter-card row g-3 mb-4">
                <div class="col-md-3">
                    <label for="filter-search" class="form-label">Поиск</label>
                    <input type="text" id="filter-search" class="form-control" placeholder="Название курса">
                </div>

                <div class="col-md-3">
                    <label for="filter-subject" class="form-label">Предмет</label>
                    <select id="filter-subject" class="form-select">
                        <option value="">Все</option>
                        <option value="Веб-разработка">Веб-разработка</option>
                        <option value="Программирование">Программирование</option>
                        <option value="Дизайн">Дизайн</option>
                        <option value="Маркетинг">Маркетинг</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="filter-level" class="form-label">Уровень</label>
                    <select id="filter-level" class="form-select">
                        <option value="">Все</option>
                        <option value="Новичок">Новичок</option>
                        <option value="Средний">Средний</option>
                        <option value="Продвинутый">Продвинутый</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="filter-price" class="form-label">Максимальная цена</label>
                    <input type="number" id="filter-price" class="form-control" min="0" placeholder="Например 2000">
                </div>

                <div class="col-12 d-flex justify-content-end gap-2">
                    <button type="submit" class="btn btn-primary-custom">
                        Найти
                    </button>
                    <button type="button" id="resetFiltersBtn" class="btn btn-outline-custom">
                        Сбросить
                    </button>
                </div>
            </form>

            <div class="section-header mb-3">
                <div>
                    <h2 class="section-title mb-1">Все курсы</h2>
                </div>
            </div>

            <div class="row g-4" id="courseList"></div>

            <nav class="mt-4" aria-label="Пагинация каталога">
                <ul class="pagination justify-content-center" id="paginationContainer"></ul>
            </nav>
        </section>
    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p class="mb-1 fw-semibold">Learnify</p>
            <p class="mb-0 small text-light">Платформа для онлайн-обучения</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/catalog.js"></script>
</body>

</html>
