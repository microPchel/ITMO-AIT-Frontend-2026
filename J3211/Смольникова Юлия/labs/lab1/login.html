<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <div id="navbar-container"></div>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 text-center mb-4">Вход</h1>

                        <form id="loginForm" novalidate>
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="loginEmail" name="email"
                                    placeholder="name@example.com" autocomplete="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="loginPassword" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="loginPassword" name="password"
                                    placeholder="Введите пароль" autocomplete="current-password" required>
                            </div>

                            <div id="formError" class="text-danger small mb-3" style="display: none;"></div>

                            <button type="submit" class="btn btn-primary-custom w-100">
                                Войти
                            </button>
                        </form>

                        <p class="text-center mt-3 small mb-0">
                            Нет аккаунта? <a href="register.html">Регистрация</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p class="mb-1 fw-semibold">Learnify</p>
            <p class="mb-0 small text-light">Платформа для онлайн-курсов и обучения</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
