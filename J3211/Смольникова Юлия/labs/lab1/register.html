<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <div id="navbar-container"></div>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 text-center mb-4">Регистрация</h1>

                        <form id="registerForm" novalidate>
                            <div class="mb-3">
                                <label for="regName" class="form-label">Имя</label>
                                <input type="text" class="form-control" id="regName" name="name"
                                    placeholder="Введите имя" autocomplete="name" required>
                            </div>

                            <div class="mb-3">
                                <label for="regEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="regEmail" name="email"
                                    placeholder="Введите email" autocomplete="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="regPass" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="regPass" name="password"
                                    placeholder="Введите пароль" autocomplete="new-password" required>
                            </div>

                            <div class="mb-3">
                                <label for="regRole" class="form-label">Роль</label>
                                <select id="regRole" name="role" class="form-select">
                                    <option value="student">Студент</option>
                                    <option value="teacher">Преподаватель</option>
                                </select>
                            </div>

                            <div id="formError" class="text-danger small mb-3" style="display: none;"></div>
                            <div id="formSuccess" class="text-success small mb-3" style="display: none;"></div>

                            <button type="submit" class="btn btn-primary-custom w-100">
                                Создать аккаунт
                            </button>
                        </form>

                        <p class="text-center mt-3 small mb-0">
                            Есть аккаунт? <a href="login.html">Войти</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p class="mb-1 fw-semibold">Learnify</p>
            <p class="mb-0 small text-light">Платформа для онлайн-курсов и обучения</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
