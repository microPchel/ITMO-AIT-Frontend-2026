<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
        <a class="navbar-brand mb-2 mb-md-0" href="index.html">FinanceManager</a>
        <ul class="navbar-nav flex-row gap-3">
            <li class="nav-item">
                <a class="nav-link active" href="index.html">Вход</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="register.html">Регистрация</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container main-block">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Вход в систему</h2>

                    <form action="dashboard.html">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" placeholder="Введите пароль" required>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">Войти</button>
                        </div>
                    </form>

                    <p class="text-center mb-0">
                        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
