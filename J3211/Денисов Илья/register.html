<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Registrer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" />
</head>
<body>
    <div class="container vh-100 d-flex justify-content-center align-items-center text-center">
        <div class="card" style="width: 28rem; height: 28em  ">
            <div class="card-body">
                <div class="form-floating">
                    <input type="text" class="form-control" id="floatingName" placeholder="Your Name">
                    <label for="floatingPassword">Name</label>
                </div>
                <div class="form-floating">
                    <input type="text" class="form-control" id="floatingSurname" placeholder="Your Surname">
                    <label for="floatingPassword">Surname</label>
                </div>
                <div class="form-floating">
                    <input type="email" class="form-control" id="floatingInputRegister" placeholder="name@example.com">
                    <label for="floatingInput">Email address</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="floatingPasswordRegister" placeholder="Password">
                    <label for="floatingPassword">Password</label>
                </div>
                <div class="form-floating mb-5">
                    <input type="password" class="form-control" id="floatingPasswordRepeatRegister" placeholder="Repeat password">
                    <label for="floatingPassword">Repeat password</label>
                </div>
                <button id="enterRegister" type="button" class="btn btn-outline-primary">Зарегестрироваться</button>
            </div>
        </div>
    </div>
    <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3">
        <div id="errorToast" class="toast text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div id="errorToastText" class="toast-body">
                    Ошибка
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="src/register.js"></script>
</body>
</html>
