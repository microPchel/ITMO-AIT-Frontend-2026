<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход</title>
    <script src="src/theme.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script type="module" src="src/enter.js"></script>
</head>
<body class="auth-page">
    <a href="#main-content" class="skip-link btn btn-primary">Перейти к основному содержимому</a>

    <button class="btn btn-outline-secondary theme-floating-btn" type="button" data-theme-toggle aria-label="Переключить тему">
        <span data-theme-label>Тёмная тема</span>
    </button>

    <main id="main-content" class="container vh-100 d-flex justify-content-center align-items-center text-center" aria-labelledby="login-title">
        <section class="card auth-card" style="width: 22rem; min-height: 20rem;">
            <div class="card-body d-flex flex-column justify-content-center">
                <h1 class="h4 mb-4" id="login-title">Вход в аккаунт</h1>
                <form id="loginForm" novalidate>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" autocomplete="email" required>
                        <label for="floatingInput">Email</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" autocomplete="current-password" required>
                        <label for="floatingPassword">Пароль</label>
                    </div>
                    <button id="enter" type="submit" class="btn btn-outline-primary w-100">Войти</button>
                </form>
            </div>
        </section>
    </main>

    <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3">
        <div id="errorToast" class="toast text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div id="errorToastText" class="toast-body">Ошибка</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть уведомление"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
