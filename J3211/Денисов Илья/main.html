<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Advertisement</title>
    <link rel="stylesheet" href="src/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" />
    <script type="module" src="src/main.js"></script>
</head>
<body>
    <header>
        <div>
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <img src="public/logo.png" alt="Логотип" id="logo-acc" />
                    <a class="navbar-brand" href="#">Task Search</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="#">Advertisement</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="account.html">Account</a>
                            </li>
                        </ul>
                        <form class="d-flex" role="search" id="searchForm">
                            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" id="search" />
                            <button class="btn btn-outline-success" type="submit">Search</button>
                        </form>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main id="main">
        <div class="d-flex justify-content-end gap-2 mb-3">
            <select id="status-filter" class="form-select w-auto">
                <option value="all">Все статусы</option>
                <option value="Планирование">Планирование</option>
                <option value="В работе">В работе</option>
                <option value="На проверке">На проверке</option>
                <option value="Завершен">Завершен</option>
                <option value="Заморожен">Заморожен</option>
            </select>

            <select id="prioritet-filter" class="form-select w-auto">
                <option value="all">Все приоритеты</option>
                <option value="Низкий">Низкий</option>
                <option value="Средний">Средний</option>
                <option value="Высокий">Высокий</option>
                <option value="Критический">Критический</option>
            </select>

            <select id="favourites-sort" class="form-select w-auto">
                <option value="az">Исполнитель: А → Я</option>
                <option value="za">Исполнитель: Я → А</option>
            </select>
        </div>

        <div class="container my-4">
            <div id="card-container" class="d-flex flex-wrap gap-3"></div>
        </div>
    </main>

    <footer class="border-top py-4 mt-auto" id="footer">
        <div class="container text-center">
            <p class="mb-3 text-muted small">@ microPchelCorporatet. Все права защищены</p>
            <p class="mb-0 text-muted small">
                <a href="#" class="text-decoration-none">Политика конфиденциальности</a>
                <span class="mx-2">|</span>
                <a href="https://t.me/IlDente" class="text-decoration-none">Контакты</a>
            </p>
        </div>
    </footer>

    <div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="taskModalTitle">Заголовок</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="taskModalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
