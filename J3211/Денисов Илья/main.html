<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Advertisement</title>
    <script src="src/theme.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script type="module" src="src/main.js"></script>
</head>
<body>
    <a href="#main-content" class="skip-link btn btn-primary">Перейти к основному содержимому</a>

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom" aria-label="Основная навигация">
            <div class="container-fluid">
                <img src="public/logo.png" alt="Логотип Task Search" id="logo-acc" />
                <a class="navbar-brand" href="main.html">Task Search</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Открыть меню навигации">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="main.html">Список задач</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="account.html">Личный кабинет</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search" id="searchForm" aria-label="Поиск по задачам">
                        <label class="visually-hidden" for="search">Поиск по задачам</label>
                        <input class="form-control me-2" type="search" placeholder="Поиск по задачам" aria-label="Поиск по задачам" id="search" />
                        <button class="btn btn-outline-success" type="submit">Найти</button>
                    </form>
                    <div class="d-flex align-items-center ms-lg-3 mt-3 mt-lg-0">
                        <button class="btn btn-outline-secondary theme-toggle-btn" type="button" data-theme-toggle aria-label="Переключить тему">
                            <span data-theme-label>Тёмная тема</span>
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <section aria-labelledby="tasks-heading">
            <div class="container pt-4">
                <h1 id="tasks-heading" class="h2 mb-1">Каталог задач</h1>
                <p class="text-muted mb-0">Используйте поиск, фильтры и сортировку для выбора подходящей задачи.</p>
            </div>

            <div class="d-flex justify-content-end gap-2 mb-3 page-toolbar" aria-label="Панель фильтрации задач">
                <div>
                    <label for="status-filter" class="visually-hidden">Фильтр по статусу</label>
                    <select id="status-filter" class="form-select w-auto" aria-label="Фильтр по статусу">
                        <option value="all">Все статусы</option>
                        <option value="Планирование">Планирование</option>
                        <option value="В работе">В работе</option>
                        <option value="На проверке">На проверке</option>
                        <option value="Завершен">Завершен</option>
                        <option value="Заморожен">Заморожен</option>
                    </select>
                </div>

                <div>
                    <label for="prioritet-filter" class="visually-hidden">Фильтр по приоритету</label>
                    <select id="prioritet-filter" class="form-select w-auto" aria-label="Фильтр по приоритету">
                        <option value="all">Все приоритеты</option>
                        <option value="Низкий">Низкий</option>
                        <option value="Средний">Средний</option>
                        <option value="Высокий">Высокий</option>
                        <option value="Критический">Критический</option>
                    </select>
                </div>

                <div>
                    <label for="favourites-sort" class="visually-hidden">Сортировка по исполнителю</label>
                    <select id="favourites-sort" class="form-select w-auto" aria-label="Сортировка по исполнителю">
                        <option value="az">Исполнитель: А → Я</option>
                        <option value="za">Исполнитель: Я → А</option>
                    </select>
                </div>
            </div>

            <div class="container my-4">
                <div id="card-container" class="d-flex flex-wrap gap-3" aria-live="polite" aria-busy="true"></div>
            </div>
        </section>
    </main>

    <footer class="border-top py-4 mt-auto" id="footer">
        <div class="container text-center">
            <p class="mb-3 text-muted small">@ microPchelCorporatet. Все права защищены</p>
            <p class="mb-0 text-muted small">
                <a href="#" class="text-decoration-none footer-link">Политика конфиденциальности</a>
                <span class="mx-2">|</span>
                <a href="https://t.me/IlDente" class="text-decoration-none footer-link">Контакты</a>
            </p>
        </div>
    </footer>

    <div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true" aria-labelledby="taskModalTitle">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title h5" id="taskModalTitle">Заголовок</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть окно"></button>
                </div>
                <div class="modal-body" id="taskModalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
