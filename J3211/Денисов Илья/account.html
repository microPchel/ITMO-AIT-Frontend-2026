<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account</title>
    <script src="src/theme.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script type="module" src="src/account.js"></script>
</head>
<body>
    <a href="#main-content" class="skip-link btn btn-primary">Перейти к основному содержимому</a>

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom" aria-label="Основная навигация">
            <div class="container-fluid">
                <img src="public/logo.png" alt="Логотип Task Search" id="logo-acc" />
                <a class="navbar-brand" href="main.html">Personal Account</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Открыть меню навигации">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="account.html">Личный кабинет</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="main.html">Список задач</a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center ms-lg-3 mt-3 mt-lg-0">
                        <button class="btn btn-outline-secondary theme-toggle-btn" type="button" data-theme-toggle aria-label="Переключить тему">
                            <span data-theme-label>Тёмная тема</span>
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <section class="container my-4" aria-labelledby="account-heading">
            <h1 id="account-heading" class="h2 mb-1">Мои заявки</h1>
            <p class="text-muted mb-4">Здесь отображаются все роли, на которые вы уже записались.</p>
            <div id="card-container" class="d-flex flex-wrap gap-3" aria-live="polite" aria-busy="true"></div>
        </section>
    </main>

    <footer class="border-top py-4 mt-auto" id="footer">
        <div class="container text-center">
            <p class="mb-3 text-muted small">@ microPchelCorporatet. Все права защищены</p>
            <p class="mb-0 text-muted small">
                <a href="#" class="text-decoration-none footer-link">Политика конфиденциальности</a>
                <span class="mx-2">|</span>
                <a href="https://t.me/IlDente" class="text-decoration-none footer-link">Контакты</a>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
