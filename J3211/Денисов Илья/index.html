<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Manager</title>
    <script src="src/theme.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="landing-page">
    <a href="#main-content" class="skip-link btn btn-primary">Перейти к основному содержимому</a>

    <button class="btn btn-outline-secondary theme-floating-btn" type="button" data-theme-toggle aria-label="Переключить тему">
        <span data-theme-label>Тёмная тема</span>
    </button>

    <main id="main-content" class="container vh-100 d-flex justify-content-center align-items-center text-center" aria-labelledby="landing-title">
        <section class="card landing-card" style="width: 20rem; min-height: 18rem;" aria-describedby="landing-description">
            <div class="card-body d-flex flex-column justify-content-center gap-3">
                <h1 class="h4 card-title mb-0" id="landing-title">Добро пожаловать на сайт</h1>
                <p class="text-muted mb-0" id="landing-description">Выберите нужное действие для продолжения работы.</p>
                <nav class="d-flex flex-column gap-2" aria-label="Основные действия на стартовой странице">
                    <a href="enter.html" class="btn btn-primary">Вход</a>
                    <a href="register.html" class="btn btn-outline-primary">Регистрация</a>
                </nav>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
